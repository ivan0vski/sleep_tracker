<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Sleep">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="description" content="Ежедневный трекер режима сна">
    <title>Sleep Tracker</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header__top">
                <span class="app-version" id="app-version"></span>
                <h1 class="header__title">Sleep Tracker</h1>
                <button class="theme-toggle" id="theme-toggle" aria-label="Сменить тему"></button>
            </div>
            <div class="date-selector" id="global-date-selector">
                <button class="date-selector__btn" id="date-prev">&larr;</button>
                <span class="date-selector__date-wrap">
                    <span class="date-selector__date" id="date-display"></span>
                    <input type="date" id="date-picker">
                </span>
                <button class="date-selector__btn" id="date-next">&rarr;</button>
                <button class="btn-today" id="btn-today">Today</button>
            </div>
            <nav class="header__nav">
                <button class="tab tab--active" data-tab="form">Трекер</button>
                <button class="tab" data-tab="protocol">Протокол</button>
                <button class="tab" data-tab="routine">Распорядок</button>
                <button class="tab" data-tab="history">История</button>
            </nav>
        </header>

        <main class="content">
            <div class="swipe-container" id="swipe-container">
                <section id="form-view" class="view"></section>
                <section id="protocol-view" class="view"></section>
                <section id="routine-view" class="view"></section>
                <section id="history-view" class="view"></section>
            </div>
        </main>

        <div class="toast" id="toast"></div>
    </div>

    <script src="js/db.js"></script>
    <script src="js/form.js"></script>
    <script src="js/protocol.js"></script>
    <script src="js/routine.js"></script>
    <script src="js/history.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
